name: Deploy GAS Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'gas/**'
      - '.github/workflows/deploy-gas.yml'

permissions:
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Authenticate and deploy
        run: |
          CREDS='${{ secrets.CLASP_CREDENTIALS }}'
          SCRIPT_ID=$(python3 -c "import json; print(json.load(open('.clasp.json'))['scriptId'])")
          DEPLOY_ID="${{ secrets.GAS_DEPLOYMENT_ID }}"

          # Parse credentials — supports both clasp format and Google ADC format
          CLIENT_ID=$(echo "$CREDS" | python3 -c "
          import sys, json
          c = json.load(sys.stdin)
          t = c.get('tokens', {}).get('default', c)
          print(t.get('client_id') or c.get('oauth2ClientSettings', {}).get('clientId'))
          ")
          CLIENT_SECRET=$(echo "$CREDS" | python3 -c "
          import sys, json
          c = json.load(sys.stdin)
          t = c.get('tokens', {}).get('default', c)
          print(t.get('client_secret') or c.get('oauth2ClientSettings', {}).get('clientSecret'))
          ")
          REFRESH_TOKEN=$(echo "$CREDS" | python3 -c "
          import sys, json
          c = json.load(sys.stdin)
          t = c.get('tokens', {}).get('default', c)
          print(t.get('refresh_token') or c.get('token', {}).get('refresh_token'))
          ")

          # Get fresh access token
          ACCESS_TOKEN=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}&refresh_token=${REFRESH_TOKEN}&grant_type=refresh_token" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Write clasp credentials file for clasp push
          python3 -c "
          import json
          creds = {
            'token': {
              'access_token': '${ACCESS_TOKEN}',
              'refresh_token': '${REFRESH_TOKEN}',
              'token_type': 'Bearer',
              'expiry_date': 9999999999999
            },
            'oauth2ClientSettings': {
              'clientId': '${CLIENT_ID}',
              'clientSecret': '${CLIENT_SECRET}',
              'redirectUri': 'http://localhost'
            },
            'isLocalCreds': False
          }
          import os; json.dump(creds, open(os.path.expanduser('~/.clasprc.json'), 'w'))
          "

          # Push code
          clasp push --force

          # Create a new script version
          VERSION=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"description\":\"${{ github.sha }}\"}" \
            "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/versions" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['versionNumber'])")
          echo "Created version: $VERSION"

          # Update deployment to point to the new version
          RESULT=$(curl -s -X PUT \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"deploymentConfig\":{\"scriptId\":\"${SCRIPT_ID}\",\"versionNumber\":${VERSION},\"manifestFileName\":\"appsscript\",\"description\":\"Deploy $(date +'%Y-%m-%d %H:%M') — ${{ github.sha }}\"}}" \
            "https://script.googleapis.com/v1/projects/${SCRIPT_ID}/deployments/${DEPLOY_ID}")
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployed to version', d['deploymentConfig']['versionNumber'])"

      - name: Set API token in Script Properties
        run: clasp run setApiToken --params '["${{ secrets.VITE_API_TOKEN }}"]'
        continue-on-error: true

      - name: Verify public access
        run: |
          sleep 5
          RESPONSE=$(curl -sL "https://script.google.com/macros/s/${{ secrets.GAS_DEPLOYMENT_ID }}/exec?action=init&token=${{ secrets.VITE_API_TOKEN }}" | head -c 20)
          if echo "$RESPONSE" | grep -qi "<!doctype"; then
            echo "::warning::GAS access restricted — go to script.google.com → Deploy → Manage deployments → set 'Who has access' to Anyone"
          else
            echo "✓ API is publicly accessible"
          fi
